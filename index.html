<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#e8a87c">
  <title>妈妈减肥打卡</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>🌸 妈妈减肥打卡</h1>
      <p class="subtitle">每天记录，健康相伴</p>
    </header>

    <main class="main">
      <section class="today-card">
        <div class="date-display" id="todayDate"></div>
        
        <div class="weight-input-group">
          <label for="weightInput">今日体重 (kg)</label>
          <input type="number" id="weightInput" placeholder="输入体重" step="0.1" min="30" max="200">
        </div>

        <button class="checkin-btn" id="checkinBtn">
          <span class="btn-icon">✓</span>
          今日打卡
        </button>

        <div class="encouragement-box" id="encouragementBox">
          <p class="encouragement-text" id="encouragementText"></p>
          <p class="checkin-time" id="checkinTime"></p>
        </div>
      </section>

      <section class="quick-stats">
        <div class="stat-item">
          <span class="stat-value" id="totalDays">0</span>
          <span class="stat-label">累计打卡</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="currentWeight">--</span>
          <span class="stat-label">当前体重</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="goalProgress">--</span>
          <span class="stat-label">目标进度</span>
        </div>
      </section>

      <section class="goal-section">
        <div class="goal-input-group">
          <label for="goalWeight">目标体重 (kg)</label>
          <input type="number" id="goalWeight" placeholder="设置目标" step="0.1" min="30" max="200">
          <button class="save-goal-btn" id="saveGoalBtn">保存</button>
        </div>
      </section>

      <section class="history-section">
        <h2>📋 体重记录</h2>
        <div class="history-list" id="historyList">
          <!-- 动态生成 -->
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>坚持就是胜利！加油妈妈！💪</p>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
