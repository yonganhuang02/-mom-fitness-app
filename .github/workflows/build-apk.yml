name: 构建 Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: 构建 APK
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 准备 Web 资源
        run: npm run build

      - name: 添加 Android 平台
        run: npx cap add android
        continue-on-error: true

      - name: 同步到 Android
        run: npx cap sync android

      - name: 构建 Debug APK（可直装）
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 妈妈减肥打卡-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
